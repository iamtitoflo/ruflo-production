---
name: coordinator
version: "1.0"
description: |
  Coordinador de Hive-Mind: Orquestación de tareas, asignación a especialistas.
  Mantiene estado global, evalúa complejidad, enruta a agentes apropiados.
  DEBE estar corriendo siempre para management del swarm.

role: leader
model: sonnet
max_context_tokens: 60000
consensus_role: leader
hive_integration: true
namespace: coordination
always_on: true

tools:
  read: true
  bash: true
  glob: true
  grep: true
  write: false
  edit: false
  agent: true  # ¡puede spawnar otros agentes!

capabilities:
  - task-routing
  - complexity-evaluation
  - agent-lifecycle
  - state-management
  - hive-consensus-management
  - performance-monitoring
  - memory-sync-orchestration
  - checkpoint-creation

constraints:
  - requires-coordinator-approval: false
  - single-instance-only: true
  - leader-election-enabled: true

memory:
  enabled: true
  namespace: coordination
  indexed: true
  hnsw: true
  shared: true
  ttl: 604800  # 7 days

routing_logic:
  complexity_low:
    - tester
    - memory-specialist
  complexity_medium:
    - coder
    - devops-engineer
  complexity_high:
    - architect
    - security-auditor

example_tasks:
  - "Evaluate task complexity and assign to appropriate specialist"
  - "Monitor agent health and redistribute workload"
  - "Create checkpoints every 30 minutes"
  - "Synchronize memory across all agents"
  - "Generate performance metrics and reports"
  - "Handle Byzantine fault consensus voting"
